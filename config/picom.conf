# Rounded corners
corner-radius:          10;

# Shadows
shadow                  : false;
xinerama-shadow-crop    : true;
shadow-radius           : 30;
shadow-offset-x         : -20;
shadow-offset-y         : -20;
shadow-opacity          : 0.35;
shadow-exclude : [
      "class_g = 'Polybar'",
      "class_g = 'latte-dock'",
      "class_g = 'plasmashell'"
 ];


opacity-rule = [ "100:class_g = 'feh'"];

rounded-corners-exclude = [
	"class_g = 'plasmashell'"
];
# Fading
fading                  : false;
fade-delta              : 6;
fade-in-step            : 0.05;
fade-out-step           : 0.05;

# Other
backend                 : "glx";
vsync                   : true;
use-damage              : "false";
glx-copy-from-front     : false;
glx-no-rebind-pixmap    : true;
glx-no-stencil          : true;
unredir-if-possible     : false;
xrender-sync-fence      : true;
mark-wmwin-focused      : true;
mark-ovredir-focused    : false;
detect-rounded-corners  : true;
detect-client-opacity   : true;
blur-method : "dual_kawase";
refresh-rate            : 60;
inactive-opacity : 1;

wintypes:
{
  dropdown_menu = { shadow = true; full-shadow = true;};
  popup_menu = { shadow = true; full-shadow = true;};
  menu = { shadow = true; full-shadow = true;};
};
